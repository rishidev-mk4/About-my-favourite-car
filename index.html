<!DOCTYPE html>
<html>
<head>
    <title>Car Details</title>

    <style>
        body{
            background-color:#f4f4f4;
            font-family:Arial, sans-serif;
        }

        h1{
            text-align:center;
            color:darkblue;
        }

        .container{
            width:80%;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        img{
            display:block;
            margin:auto;
            width:60%;
            border-radius:10px;
        }

        h2{
            color:green;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        table, th, td{
            border:1px solid black;
        }

        th{
            background-color:lightblue;
        }

        th, td{
            padding:10px;
            text-align:center;
        }

        ul{
            color:#333;
        }

        .price{
            color:red;
            font-size:25px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>TOYOTA SUPRA MK4</h1>

    <img src="supra.jpg" alt="Toyota Supra">

    <h2>Specifications</h2>

    <table>
        <tr>
            <th>Specification</th>
            <th>Details</th>
        </tr>

        <tr>
            <td>Engine</td>
            <td>3.0L Twin Turbo</td>
        </tr>

        <tr>
            <td>Power</td>
            <td>320 HP</td>
        </tr>

        <tr>
            <td>Transmission</td>
            <td>6-Speed Manual</td>
        </tr>

        <tr>
            <td>Top Speed</td>
            <td>250 km/h</td>
        </tr>

        <tr>
            <td>Fuel Type</td>
            <td>Petrol</td>
        </tr>
    </table>

    <h2>Features</h2>

    <ul>
        <li>ABS with EBD</li>
        <li>Air Conditioning</li>
        <li>Power Steering</li>
        <li>Leather Seats</li>
        <li>Touchscreen Infotainment System</li>
    </ul>

    <h2>Price</h2>

    <p class="price">₹85,00,000</p>

</div>

</body>
</html>
